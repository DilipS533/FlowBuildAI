    <script>
      (function(){
        function safeStringify(obj) {
          try {
            if (typeof obj === 'string') return obj;
            if (obj instanceof Error) return obj.message + '\n' + (obj.stack || '');
            return JSON.stringify(obj, Object.getOwnPropertyNames(obj)) || String(obj);
          } catch (e) {
            return String(obj);
          }
        }

        function showError(info){
          try{
            var root = document.getElementById('root');
            if(!root) return;
            var text = '';
            if (info && typeof info === 'object') {
              text = '';
              if (info.message) text += info.message + '\n';
              if (info.filename) text += 'File: ' + info.filename + '\n';
              if (info.lineno || info.colno) text += 'Location: ' + (info.lineno||'') + ':' + (info.colno||'') + '\n';
              if (info.error) text += safeStringify(info.error) + '\n';
              if (!text.trim()) text = safeStringify(info);
            } else {
              text = safeStringify(info);
            }

            root.innerHTML = '<div style="padding:28px;text-align:center;font-family:Arial,Helvetica,sans-serif;color:#b35a14;background:#fff7f2;border:1px solid #f0c9b0;border-radius:12px;">'
              + '<h2>Application error</h2>'
              + '<pre style="white-space:pre-wrap; text-align:left; max-width:760px; margin:0 auto; color:#6b2f00;">'+
                String(text).replace(/</g,'&lt;')+
              '</pre>'
              + '<p style="color:#5f746b;">Open the browser console (F12) for full diagnostics.</p></div>';
            // Also log to console to help remote diagnostics
            console.error('In-page error catcher:', info);
          }catch(e){/* ignore */}
        }

        window.addEventListener('error', function(evt){
          // evt may be an ErrorEvent
          try {
            const payload = {
              message: evt.message || 'Error',
              filename: evt.filename || (evt.target && evt.target.src) || null,
              lineno: evt.lineno || null,
              colno: evt.colno || null,
              error: evt.error || null,
              type: evt.type || 'error'
            };
            showError(payload);
          } catch (e) {
            showError(evt);
          }
        }, true);

        window.addEventListener('unhandledrejection', function(evt){
          try {
            const reason = evt.reason;
            const payload = {
              message: 'Unhandled promise rejection',
              reason: reason,
              type: 'unhandledrejection'
            };
            showError(payload);
          } catch (e) {
            showError(evt);
          }
        }, true);

        // small heartbeat to show the app hasn't initialized after 6s
        setTimeout(function(){
          try{
            if(document.getElementById('root') && document.getElementById('root').children.length === 0){
              showError({ message: 'App did not initialize within expected time.' });
            }
          } catch(e) {}
        }, 6000);
      })();
    </script>
